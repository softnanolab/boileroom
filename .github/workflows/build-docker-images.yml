name: Build and Push Boileroom Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency: dockerhub-builds-${{ github.ref }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine Boileroom version
        id: project_version
        run: |
          VERSION=$(
            python3 -c "import pathlib, tomllib; pyproject = pathlib.Path('pyproject.toml').read_text(encoding='utf-8'); data = tomllib.loads(pyproject); print(data['project']['version'], end='')"
          )
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push latest images
        run: |
          python3 ./scripts/images/build_model_images.py --all-cuda --tag=latest --push

      - name: Verify canonical latest image imports
        run: |
          python3 ./scripts/images/check_model_imports.py --all-cuda --tag=latest --pull

      - name: Verify latest alias image imports
        run: |
          python3 ./scripts/images/check_model_imports.py --tag=latest --pull

      - name: Build and push versioned images
        run: |
          python3 ./scripts/images/build_model_images.py --all-cuda --tag=${{ steps.project_version.outputs.value }} --push

      - name: Verify canonical versioned image imports
        run: |
          python3 ./scripts/images/check_model_imports.py --all-cuda --tag=${{ steps.project_version.outputs.value }} --pull

      - name: Verify version alias image imports
        run: |
          python3 ./scripts/images/check_model_imports.py --tag=${{ steps.project_version.outputs.value }} --pull
