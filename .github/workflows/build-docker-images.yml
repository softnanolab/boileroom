name: Build and Push Boileroom Images

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      promote:
        description: Promote validated images to the derived prerelease version. Only allowed from main.
        required: true
        type: boolean
        default: false
      docker_repository:
        description: Docker repository namespace for manual runs, for example docker.io/my-dockerhub-user.
        required: true
        type: string
        default: docker.io/jakublala
      dockerhub_username:
        description: Docker Hub username for manual runs.
        required: true
        type: string
        default: jakublala
      dockerhub_token_secret:
        description: Name of the GitHub secret containing the Docker Hub token for manual runs.
        required: true
        type: string
        default: DOCKERHUB_TOKEN

permissions:
  contents: read

concurrency: dockerhub-builds-${{ github.ref }}

env:
  DOCKER_REPOSITORY_FOR_RUN: ${{ github.event.inputs.docker_repository || 'docker.io/jakublala' }}
  DOCKERHUB_USERNAME_FOR_RUN: ${{ github.event.inputs.dockerhub_username || secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN_SECRET_FOR_RUN: ${{ github.event.inputs.dockerhub_token_secret || 'DOCKERHUB_TOKEN' }}
  IMAGE_BUILD_MAX_WORKERS: "3"
  SHOULD_PROMOTE: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'release' && github.event.release.prerelease == false) || inputs.promote }}

jobs:
  prepare-release:
    if: ${{ github.event_name != 'release' || github.event.release.prerelease == false }}
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.docker_tag }}
      validation_tag: ${{ steps.validation_tag.outputs.value }}
      cuda_versions: ${{ steps.image_metadata.outputs.cuda_versions }}
      default_cuda_version: ${{ steps.image_metadata.outputs.default_cuda_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release ref
        run: |
          if [ "$SHOULD_PROMOTE" = "true" ] && [ "$GITHUB_REF" != "refs/heads/main" ] && [ "$GITHUB_EVENT_NAME" != "release" ]; then
            echo "Publishing prerelease tags is only allowed from main."
            exit 1
          fi
          if [ "$SHOULD_PROMOTE" != "true" ]; then
            echo "Running validation-only image workflow for $GITHUB_REF."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: image-prepare

      - name: Determine Boileroom version
        id: version
        run: |
          version_args=()
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            version_args+=(--release-tag "$GITHUB_REF_NAME")
          fi

          uv run --no-project --with pyyaml python ./scripts/ci/derive_version.py "${version_args[@]}" --github-output "$GITHUB_OUTPUT"

      - name: Determine validation tag
        id: validation_tag
        run: echo "value=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Determine image metadata
        id: image_metadata
        run: |
          uv run --no-project --with pyyaml python - <<'PY' >> "$GITHUB_OUTPUT"
          import json

          from boileroom.images.metadata import CUDA_MICROMAMBA_BASE, DEFAULT_CUDA_VERSION

          print(f"cuda_versions={json.dumps(sorted(CUDA_MICROMAMBA_BASE))}")
          print(f"default_cuda_version={DEFAULT_CUDA_VERSION}")
          PY

  build-validation-images:
    needs: prepare-release
    name: Build Validation Images (${{ matrix.platform }}, CUDA ${{ matrix.cuda_version }})
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        cuda_version: ${{ fromJSON(needs.prepare-release.outputs.cuda_versions) }}
        platform: [linux/amd64]
        include:
          - cuda_version: ${{ needs.prepare-release.outputs.default_cuda_version }}
            platform: linux/arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: image-build-${{ matrix.platform }}-${{ matrix.cuda_version }}

      - name: Prepare image script dependencies
        run: uv run --no-project --with pyyaml python -c "import yaml"

      - name: Log in to Docker Hub
        if: matrix.platform == 'linux/amd64'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME_FOR_RUN }}
          password: ${{ secrets[env.DOCKERHUB_TOKEN_SECRET_FOR_RUN] }}

      - name: Build validation images
        shell: bash
        run: |
          build_args=()
          if [ "${{ matrix.platform }}" = "linux/amd64" ]; then
            build_args+=(--push --local-base)
          fi

          uv run --no-project --with pyyaml python ./scripts/images/build_model_images.py \
            --cuda-version=${{ matrix.cuda_version }} \
            --tag=${{ needs.prepare-release.outputs.validation_tag }} \
            --docker-user="${DOCKER_REPOSITORY_FOR_RUN}" \
            --platform=${{ matrix.platform }} \
            "${build_args[@]}" \
            --max-workers=${IMAGE_BUILD_MAX_WORKERS} \
            --verbose

      - name: Verify local canonical validation image imports
        run: |
          uv run --no-project --with pyyaml python ./scripts/images/check_model_imports.py \
            --cuda-version=${{ matrix.cuda_version }} \
            --docker-user="${DOCKER_REPOSITORY_FOR_RUN}" \
            --tag=${{ needs.prepare-release.outputs.validation_tag }}

      - name: Verify local canonical validation image server health
        run: |
          uv run --no-project --with pyyaml python ./scripts/images/check_model_server_health.py \
            --cuda-version=${{ matrix.cuda_version }} \
            --docker-user="${DOCKER_REPOSITORY_FOR_RUN}" \
            --tag=${{ needs.prepare-release.outputs.validation_tag }}

      - name: Verify local validation alias image imports
        if: matrix.platform == 'linux/amd64' && matrix.cuda_version == needs.prepare-release.outputs.default_cuda_version
        run: |
          uv run --no-project --with pyyaml python ./scripts/images/check_model_imports.py \
            --docker-user="${DOCKER_REPOSITORY_FOR_RUN}" \
            --tag=${{ needs.prepare-release.outputs.validation_tag }}

      - name: Verify local validation alias image server health
        if: matrix.platform == 'linux/amd64' && matrix.cuda_version == needs.prepare-release.outputs.default_cuda_version
        run: |
          uv run --no-project --with pyyaml python ./scripts/images/check_model_server_health.py \
            --docker-user="${DOCKER_REPOSITORY_FOR_RUN}" \
            --tag=${{ needs.prepare-release.outputs.validation_tag }}

      - name: Free disk space after build
        if: always()
        run: |
          docker builder prune --all --force

  promote-validated-images:
    needs: [ prepare-release, build-validation-images ]
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'release' || inputs.promote }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: image-promote

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME_FOR_RUN }}
          password: ${{ secrets[env.DOCKERHUB_TOKEN_SECRET_FOR_RUN] }}

      - name: Promote validated images to target tag
        run: |
          uv run --no-project --with pyyaml python ./scripts/images/promote_image_tags.py \
            --all-cuda \
            --docker-user="${DOCKER_REPOSITORY_FOR_RUN}" \
            --source-tag=${{ needs.prepare-release.outputs.validation_tag }} \
            --target-tag=${{ needs.prepare-release.outputs.release_version }}
