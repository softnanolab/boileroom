name: Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

permissions:
  contents: read

concurrency: integration-tests-${{ github.ref }}

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install the package
        run: uv pip install -e .

      - name: Authenticate Modal
        shell: bash -l {0}
        run: uv run modal token set --token-id ${{ secrets.MODAL_API_TOKEN_ID }} --token-secret ${{ secrets.MODAL_API_TOKEN_SECRET }}

      - name: Run integration tests
        shell: bash -l {0}
        run: uv run pytest -n 4 -m integration
